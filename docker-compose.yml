version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gbc-backend
    ports:
      - "4000:4000"
    # Mount the local environment file directly inside the container instance
    env_file:
      - .env
    # Optional: Automatically restart the fast API process if it crashes
    restart: unless-stopped

  bot:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gbc-bot
    command: ["python", "bot.py"]
    volumes:
      - ./backend/data:/app/data
    env_file:
      - .env
    restart: unless-stopped
